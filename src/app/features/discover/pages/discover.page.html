<ion-content [fullscreen]="true">
  @if(user?.uid){
  <div id="main-container">
    <app-discover-sidebar
      [userProfile]="userProf"
      [promotions]="promotions"
      [matches]="matches"
      [conversationPreviews]="matchConversationPreviews"
      [selectedMatchUid]="selectedMessProf?.uid"
      [billingCurrent]="billingStore.current()"
      [isPremium]="billingStore.isPremium()"
      [activeEntitlements]="billingStore.activeEntitlements()"
      [superLikesBalance]="billingStore.superLikesBalance()"
      (profileOpened)="openUserCard()"
      (matchesOpened)="showMatchesCard()"
      (messagesOpened)="showMessages()"
      (messageOpened)="openMessWithMatch($event)"
      (promotionSelected)="openPaywall($event)"
    ></app-discover-sidebar>

    <div
      id="main-view-container"
      class="m-0 p-0"
      [class.is-message-view]="isShowMessages"
    >
      @if(!isUserCardOpen) {
      <ion-grid class="m-0 p-0">
        <ion-row class="m-0 p-0 ion-justify-content-center">
          <ion-col class="m-0 p-0" size="12">
            @if(isShowMessages) {
            <ion-card class="app-message-card m-0 p-0">
              <app-message
                [matches]="matches"
                [options]="options"
                [matchProfile]="selectedMessProf"
                (messageSent)="handleMessageSent($event)"
                (matchRemoved)="handleMatchRemoved($event)"
              ></app-message>
            </ion-card>
            } @if(!isShowMessages) {
            <app-discover-match-card
              [progress]="progress"
              [buffer]="buffer"
              [matchProfile]="matchProf"
              [isMatchPlaceHolder]="isMatchPlaceHolder"
              [hasRewindCandidate]="hasRewindCandidate"
              [isRewindLocked]="isRewindLocked"
              [freeRewindsRemaining]="freeRewindsRemaining"
              [canSuperLike]="canSuperLike"
              (detailsToggled)="toggleMatchDetails()"
              (rewindRequested)="rewindCurrentMatch()"
              (liked)="likeCurrentMatch()"
              (disliked)="dislikeCurrentMatch()"
              (superLiked)="superLikeCurrentMatch()"
            ></app-discover-match-card>
            } @if(isMatchDetailsOpen || (options.phoneView && !isShowMessages && !isMatchPlaceHolder
            && matchProf)) {
            <app-discover-match-details
              [labels]="labels"
              [matchProfile]="matchProf"
              [possibleDetailLists]="possMatchDetLists"
              (closed)="closeMatchDetails()"
            ></app-discover-match-details>
            }
          </ion-col>
        </ion-row>
      </ion-grid>
      } @if(isUserCardOpen && userProf) {
      <app-discover-profile-panel
        [userProfile]="userProf"
        [labels]="labels"
        [options]="options"
        [selectedFiles]="selectedFiles"
        [startUpdate]="startUpdUserProf"
        [billingCurrent]="billingStore.current()"
        [isPremium]="billingStore.isPremium()"
        [activeEntitlements]="billingStore.activeEntitlements()"
        [superLikesBalance]="billingStore.superLikesBalance()"
        (startUpdateRequested)="startUpdateUserProf()"
        (profilePictureOpened)="showProfPics($event)"
        (picturesSaved)="savePictures()"
        (profileUpdated)="updateUserProf()"
        (profileDeleted)="confirmDeleteUserProf()"
        (signOutRequested)="signOutAlert()"
        (choicesSelected)="handleChoiceSelected($event)"
      ></app-discover-profile-panel>
      }
    </div>

    @if(options.phoneView || promoBottomSheetOpen) {
    <app-promo-bottom-sheet
      [isOpen]="promoBottomSheetOpen"
      [promotions]="promoBottomSheetPromotions"
      [activeIndex]="promoBottomSheetActiveIndex"
      (dismissed)="handlePromoBottomSheetDismiss($event)"
    ></app-promo-bottom-sheet>
    }
  </div>
  }
</ion-content>
