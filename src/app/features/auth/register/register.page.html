<ng-container *transloco="let t">
  <ion-header [translucent]="true">
    <ion-toolbar>
      <ion-title>{{ t('app.name') }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content [fullscreen]="true">
    <ion-header collapse="condense">
      <ion-toolbar>
        <ion-title size="large">{{ t('auth.register.title') }}</ion-title>
      </ion-toolbar>
    </ion-header>

    <div class="background-image-cont">
      <img
        src="https://img.freepik.com/free-photo/silhouette-couple-love-being-affectionate_23-2150984243.jpg?t=st=1741881261~exp=1741884861~hmac=f9d3a5a0a33547efaac51151634c9c05c1de7deadfe301a56e56ff9cd2d284a9&w=740"
        alt="Romantic couple silhouette"
      />
    </div>

    <div class="ion-padding reg-container">
      <ion-button color="success" expand="block" (click)="regUser()">
        {{ user?.uid ? t('auth.register.continue') : t('auth.register.createAccount') }} @if
        (user?.uid) {
        <ion-icon name="arrow-forward-outline"></ion-icon>
        } @else {
        <ion-icon name="people-outline"></ion-icon>
        }
      </ion-button>

      <ion-button expand="block" fill="clear" routerLink="/amor/login">
        {{ t('auth.register.goToLogin') }}
      </ion-button>
    </div>
  </ion-content>
</ng-container>
