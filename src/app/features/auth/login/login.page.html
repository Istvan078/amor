<ng-container *transloco="let t">
  <ion-header [translucent]="true">
    <ion-toolbar>
      <ion-title>{{ t('auth.headline') }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content [fullscreen]="true">
    <ion-header collapse="condense">
      <ion-toolbar>
        <ion-title size="large">{{ t('auth.login.title') }}</ion-title>
      </ion-toolbar>
    </ion-header>

    <div class="background-image-cont">
      <img
        src="https://img.freepik.com/free-vector/flat-dia-del-amor-y-la-amistad-text-illustration_23-2150627670.jpg?t=st=1741890904~exp=1741894504~hmac=b0a2aac9dc648b594e6cca4962f827fb66c9861843ff154e3c7545d917fc14c8&w=740"
        alt="Romantic illustration"
      />
    </div>

    <div class="ion-padding login-container">
      <ion-label>{{ t('auth.login.email') }}</ion-label>
      <ion-input [(ngModel)]="loginData.data.email" type="email"></ion-input>

      <ion-label>{{ t('auth.login.password') }}</ion-label>
      <ion-input
        [(ngModel)]="loginData.data.password"
        type="password"
        (keydown.enter)="loginUser()"
      ></ion-input>

      <ion-button expand="block" (click)="loginUser()"> {{ t('auth.login.submit') }} </ion-button>

      <ion-button expand="block" fill="clear" routerLink="/amor/register">
        {{ t('auth.login.goToRegister') }}
      </ion-button>
    </div>
  </ion-content>
</ng-container>
