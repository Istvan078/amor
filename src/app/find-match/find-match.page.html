<ng-container *transloco="let t">
  <ion-header [translucent]="true">
    <ion-toolbar>
      <ion-title>{{ t('findMatch.title') }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content [fullscreen]="true">
    <ion-header collapse="condense">
      <ion-toolbar>
        <ion-title size="large">{{ t('findMatch.title') }}</ion-title>
      </ion-toolbar>
    </ion-header>
  </ion-content>
</ng-container>
